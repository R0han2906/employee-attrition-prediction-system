<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Attrition Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page">
        <header class="masthead">
            <span class="eyebrow">Workforce Analytics</span>
            <h1>IBM Employee Attrition Predictor</h1>
            <p class="subtitle">Enter a record below to estimate the likelihood this employee leaves.</p>
        </header>

        <div class="card">
            <form id="predictionForm">

                <fieldset>
                    <legend><span class="tag">01</span>Personal</legend>

                    <div class="field">
                        <label for="Age">Age</label>
                        <input type="number" id="Age" required min="18" max="80" placeholder="e.g. 34">
                    </div>

                    <div class="field">
                        <label for="MaritalStatus">Marital status</label>
                        <select id="MaritalStatus" required>
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Divorced">Divorced</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="DistanceFromHome">Distance from home (km)</label>
                        <input type="number" id="DistanceFromHome" required min="0" placeholder="e.g. 8">
                    </div>
                </fieldset>

                <fieldset>
                    <legend><span class="tag">02</span>Role</legend>

                    <div class="field">
                        <label for="Department">Department</label>
                        <select id="Department" required>
                            <option value="Sales">Sales</option>
                            <option value="Research & Development">Research &amp; Development</option>
                            <option value="Human Resources">Human Resources</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="BusinessTravel">Business travel</label>
                        <select id="BusinessTravel" required>
                            <option value="Travel_Rarely">Travel rarely</option>
                            <option value="Travel_Frequently">Travel frequently</option>
                            <option value="Non-Travel">Non-travel</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="OverTime">Works overtime</label>
                        <select id="OverTime" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="YearsAtCompany">Years at company</label>
                        <input type="number" id="YearsAtCompany" required min="0" placeholder="e.g. 5">
                    </div>

                    <div class="field">
                        <label for="YearsSinceLastPromotion">Years since last promotion</label>
                        <input type="number" id="YearsSinceLastPromotion" required min="0" placeholder="e.g. 2">
                    </div>
                </fieldset>

                <fieldset>
                    <legend><span class="tag">03</span>Satisfaction</legend>

                    <div class="field-row">
                        <div class="field">
                            <label for="EnvironmentSatisfaction">Environment <span class="scale">1–4</span></label>
                            <input type="number" id="EnvironmentSatisfaction" required min="1" max="4" placeholder="1–4">
                        </div>

                        <div class="field">
                            <label for="JobSatisfaction">Job <span class="scale">1–4</span></label>
                            <input type="number" id="JobSatisfaction" required min="1" max="4" placeholder="1–4">
                        </div>

                        <div class="field">
                            <label for="WorkLifeBalance">Work-life <span class="scale">1–4</span></label>
                            <input type="number" id="WorkLifeBalance" required min="1" max="4" placeholder="1–4">
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend><span class="tag">04</span>Compensation</legend>

                    <div class="field">
                        <label for="MonthlyIncome">Monthly income</label>
                        <input type="number" id="MonthlyIncome" required min="0" placeholder="e.g. 52000">
                    </div>
                </fieldset>

                <button type="submit">Run prediction</button>
            </form>

            <div id="result"></div>
        </div>

        <footer class="foot-note">Model output is an estimate, not a guarantee.</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
